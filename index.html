<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Trinity</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='black'/><text x='50%' y='70%' text-anchor='middle' fill='white' font-family='Arial, sans-serif' font-weight='bold' font-size='70'>T</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
            },
            colors: {
              dealr: {
                bg: '#ffffff',
                text: '#292929',
                accent: '#0000ff',
                border: '#e5e7eb',
                surface: '#f8f8f8',
                input: '#ffffff'
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Ultra-clean scrollbar for light theme */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d1d1; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0000ff; 
      }

      body {
        background-color: #ffffff;
        color: #292929;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
      }

      /* Aggressive Table Tightering & No Mobile Scroll */
      .prose table {
        width: 100% !important;
        table-layout: fixed !important;
        border-collapse: collapse !important;
        margin: 0.25rem 0 !important;
        font-size: 11px !important;
        line-height: 1.2 !important;
      }
      
      .prose th, .prose td {
        word-break: break-word !important;
        overflow-wrap: break-word !important;
        padding: 4px 4px !important;
        border: 1px solid #e5e7eb !important;
      }

      @media (max-width: 640px) {
        .prose table {
          font-size: 9px !important;
        }
        .prose th, .prose td {
          padding: 3px 2px !important;
        }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-dealr-in {
        animation: slideUp 0.3s ease-out forwards;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
        "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0",
        "rehype-raw": "https://esm.sh/rehype-raw@^7.0.0",
        "uuid": "https://esm.sh/uuid@^13.0.0",
        "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>

</body>
